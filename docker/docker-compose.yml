version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: camper-rent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: camper_rent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d camper_rent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: camper-rent-backend
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: camper_rent
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
